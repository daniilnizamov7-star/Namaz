<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="Lesso — CRM для репетиторов. Уроки, слова, ученики.">
  <title>Lesso</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .nav-btn.active { border-bottom-color: #3b82f6; color: #3b82f6; }
    .status-new { background: #e5e7eb; color: #374151; }
    .status-learning { background: #dbeafe; color: #1e40af; }
    .status-almost { background: #fef3c7; color: #b45309; }
    .status-known { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body class="pb-20">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
        <i class="ph ph-book-open text-xl"></i>
      </div>
      <h1 class="text-lg font-bold">Lesso</h1>
    </div>
  </div>
</header>

<!-- Navigation -->
<nav class="bg-white border-b border-gray-200">
  <div class="max-w-4xl mx-auto px-4">
    <div class="flex space-x-6 overflow-x-auto">
      <button onclick="showTab('lessons')" class="nav-btn active px-3 py-3 border-b-2 border-blue-600 text-blue-600 font-medium text-sm whitespace-nowrap">📅 Уроки</button>
      <button onclick="showTab('words')" class="nav-btn px-3 py-3 border-b-2 border-transparent text-gray-500 font-medium text-sm whitespace-nowrap">📚 Слова</button>
      <button onclick="showTab('students')" class="nav-btn px-3 py-3 border-b-2 border-transparent text-gray-500 font-medium text-sm whitespace-nowrap">👥 Ученики</button>
    </div>  </div>
</nav>

<main class="max-w-4xl mx-auto px-4 py-6">

  <!-- LESSONS TAB -->
  <div id="lessons" class="tab-content active">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Уроки</h2>
      <button onclick="openModal('lesson')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">➕ Добавить</button>
    </div>
    <div id="lessons-list" class="space-y-3"></div>
  </div>

  <!-- WORDS TAB -->
  <div id="words" class="tab-content">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Слова</h2>
      <button onclick="openModal('word')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">➕ Добавить</button>
    </div>
    <div class="flex gap-2 mb-4 overflow-x-auto">
      <button onclick="filterWords('all')" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm">Все</button>
      <button onclick="filterWords('new')" class="px-3 py-1.5 status-new rounded-lg text-sm">Новое</button>
      <button onclick="filterWords('learning')" class="px-3 py-1.5 status-learning rounded-lg text-sm">Учит</button>
      <button onclick="filterWords('almost')" class="px-3 py-1.5 status-almost rounded-lg text-sm">Почти</button>
      <button onclick="filterWords('known')" class="px-3 py-1.5 status-known rounded-lg text-sm">Знает</button>
    </div>
    <div id="words-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
  </div>

  <!-- STUDENTS TAB -->
  <div id="students" class="tab-content">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Ученики</h2>
      <button onclick="openModal('student')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">➕ Добавить</button>
    </div>
    <div id="students-list" class="space-y-3"></div>
  </div>

</main>

<!-- LESSON MODAL -->
<div id="modal-lesson" class="modal">
  <div class="bg-white rounded-xl max-w-md w-full p-6 m-4 max-h-[90vh] overflow-y-auto">
    <h3 class="text-lg font-semibold mb-4">📝 Урок</h3>
    <form onsubmit="saveLesson(event)" class="space-y-3">
      <input type="hidden" id="lesson-id">
      <div>
        <label class="block text-sm font-medium mb-1">Тема урока</label>
        <input type="text" id="lesson-topic" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Дата и время</label>
        <input type="datetime-local" id="lesson-date" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Ссылка Zoom</label>
        <input type="url" id="lesson-zoom" placeholder="https://..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Домашнее задание</label>
        <textarea id="lesson-hw" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">📷 Фото ДЗ от ученика</label>
        <input type="file" id="lesson-photo" accept="image/*" class="w-full px-3 py-2 border rounded-lg">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Оценка</label>
        <select id="lesson-grade" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option value="">— Не ставить —</option>
          <option value="5">5 — Отлично</option>
          <option value="4">4 — Хорошо</option>
          <option value="3">3 — Удовл.</option>
          <option value="2">2 — Плохо</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Заметки</label>
        <textarea id="lesson-notes" rows="2" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Материалы урока</label>
        <input type="file" id="lesson-materials" class="w-full px-3 py-2 border rounded-lg">
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Сохранить</button>
        <button type="button" onclick="closeModal('lesson')" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium">Отмена</button>
      </div>
    </form>
  </div>
</div>

<!-- WORD MODAL -->
<div id="modal-word" class="modal">
  <div class="bg-white rounded-xl max-w-md w-full p-6 m-4">
    <h3 class="text-lg font-semibold mb-4">📚 Новое слово</h3>
    <form onsubmit="saveWord(event)" class="space-y-3">
      <input type="hidden" id="word-id">
      <div>        <label class="block text-sm font-medium mb-1">Английское слово</label>
        <input type="text" id="word-en" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Перевод</label>
        <input type="text" id="word-ru" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Тема</label>
        <input type="text" id="word-topic" placeholder="Еда, Школа..." class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Уровень</label>
        <select id="word-level" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option value="new">Новое</option>
          <option value="learning">Учит</option>
          <option value="almost">Почти</option>
          <option value="known">Знает</option>
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Добавить</button>
        <button type="button" onclick="closeModal('word')" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium">Отмена</button>
      </div>
    </form>
  </div>
</div>

<!-- STUDENT MODAL -->
<div id="modal-student" class="modal">
  <div class="bg-white rounded-xl max-w-md w-full p-6 m-4">
    <h3 class="text-lg font-semibold mb-4">👤 Ученик</h3>
    <form onsubmit="saveStudent(event)" class="space-y-3">
      <input type="hidden" id="student-id">
      <div>
        <label class="block text-sm font-medium mb-1">Имя</label>
        <input type="text" id="student-name" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Предмет</label>
        <input type="text" id="student-subject" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">PIN-код (4 цифры)</label>
        <input type="text" id="student-pin" pattern="[0-9]{4}" maxlength="4" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      <div class="bg-blue-50 p-3 rounded-lg text-xs text-blue-800">
        👨‍👩‍👦 Родители привязываются сами через «Привязать ребёнка» в своём кабинете. PIN можно передать маме и папе — каждый привяжется отдельно.
      </div>
      <div class="flex gap-2 pt-2">        <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Сохранить</button>
        <button type="button" onclick="closeModal('student')" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium">Отмена</button>
      </div>
    </form>
  </div>
</div>

<script>
  // Data
  let data = {
    lessons: JSON.parse(localStorage.getItem('lesso_lessons')) || [],
    words: JSON.parse(localStorage.getItem('lesso_words')) || [],
    students: JSON.parse(localStorage.getItem('lesso_students')) || []
  };

  let currentFilter = 'all';

  function saveData() {
    localStorage.setItem('lesso_lessons', JSON.stringify(data.lessons));
    localStorage.setItem('lesso_words', JSON.stringify(data.words));
    localStorage.setItem('lesso_students', JSON.stringify(data.students));
  }

  // Tabs
  function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.remove('active', 'border-blue-600', 'text-blue-600');
      b.classList.add('border-transparent', 'text-gray-500');
    });
    document.getElementById(tab).classList.add('active');
    event.target.closest('.nav-btn').classList.add('active', 'border-blue-600', 'text-blue-600');
    event.target.closest('.nav-btn').classList.remove('border-transparent', 'text-gray-500');
    renderAll();
  }

  // Modals
  function openModal(type) {
    document.getElementById(`modal-${type}`).classList.add('active');
    if (type === 'lesson') {
      document.getElementById('lesson-date').value = new Date().toISOString().slice(0, 16);
    }
  }

  function closeModal(type) {
    document.getElementById(`modal-${type}`).classList.remove('active');
    document.querySelector(`#modal-${type} form`).reset();
  }

  // Lessons  function saveLesson(e) {
    e.preventDefault();
    const id = document.getElementById('lesson-id').value || Date.now().toString();
    const lesson = {
      id,
      topic: document.getElementById('lesson-topic').value,
      date: document.getElementById('lesson-date').value,
      zoom: document.getElementById('lesson-zoom').value,
      hw: document.getElementById('lesson-hw').value,
      grade: document.getElementById('lesson-grade').value,
      notes: document.getElementById('lesson-notes').value
    };
    const idx = data.lessons.findIndex(l => l.id === id);
    if (idx >= 0) data.lessons[idx] = lesson;
    else data.lessons.push(lesson);
    saveData();
    closeModal('lesson');
    renderLessons();
  }

  function renderLessons() {
    const list = document.getElementById('lessons-list');
    if (!data.lessons.length) {
      list.innerHTML = '<p class="text-gray-500 text-center py-8">Нет уроков</p>';
      return;
    }
    list.innerHTML = data.lessons.sort((a, b) => new Date(b.date) - new Date(a.date)).map(l => `
      <div class="bg-white p-4 rounded-xl border border-gray-200">
        <div class="flex justify-between items-start">
          <div>
            <h3 class="font-semibold">${l.topic}</h3>
            <p class="text-sm text-gray-600">${new Date(l.date).toLocaleString('ru', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}</p>
            ${l.grade ? `<span class="inline-block mt-1 px-2 py-0.5 bg-blue-100 text-blue-800 rounded text-xs">Оценка: ${l.grade}</span>` : ''}
          </div>
          <div class="flex gap-1">
            <button onclick="editLesson('${l.id}')" class="p-2 text-blue-600 hover:bg-blue-50 rounded"><i class="ph ph-pencil-simple"></i></button>
            <button onclick="deleteLesson('${l.id}')" class="p-2 text-red-600 hover:bg-red-50 rounded"><i class="ph ph-trash"></i></button>
          </div>
        </div>
        ${l.hw ? `<p class="text-sm text-gray-700 mt-2"><b>ДЗ:</b> ${l.hw}</p>` : ''}
        ${l.notes ? `<p class="text-sm text-gray-600 mt-1">${l.notes}</p>` : ''}
      </div>
    `).join('');
  }

  function editLesson(id) {
    const l = data.lessons.find(x => x.id === id);
    document.getElementById('lesson-id').value = l.id;
    document.getElementById('lesson-topic').value = l.topic;
    document.getElementById('lesson-date').value = l.date;    document.getElementById('lesson-zoom').value = l.zoom || '';
    document.getElementById('lesson-hw').value = l.hw || '';
    document.getElementById('lesson-grade').value = l.grade || '';
    document.getElementById('lesson-notes').value = l.notes || '';
    openModal('lesson');
  }

  function deleteLesson(id) {
    if (confirm('Удалить урок?')) {
      data.lessons = data.lessons.filter(l => l.id !== id);
      saveData();
      renderLessons();
    }
  }

  // Words
  function saveWord(e) {
    e.preventDefault();
    const id = document.getElementById('word-id').value || Date.now().toString();
    const word = {
      id,
      en: document.getElementById('word-en').value,
      ru: document.getElementById('word-ru').value,
      topic: document.getElementById('word-topic').value,
      level: document.getElementById('word-level').value
    };
    const idx = data.words.findIndex(w => w.id === id);
    if (idx >= 0) data.words[idx] = word;
    else data.words.push(word);
    saveData();
    closeModal('word');
    renderWords();
  }

  function filterWords(filter) {
    currentFilter = filter;
    renderWords();
  }

  function renderWords() {
    const list = document.getElementById('words-list');
    const filtered = currentFilter === 'all' ? data.words : data.words.filter(w => w.level === currentFilter);
    if (!filtered.length) {
      list.innerHTML = '<p class="text-gray-500 text-center py-8 col-span-2">Нет слов</p>';
      return;
    }
    const labels = { new: 'Новое', learning: 'Учит', almost: 'Почти', known: 'Знает' };
    list.innerHTML = filtered.map(w => `
      <div class="bg-white p-3 rounded-xl border border-gray-200 flex justify-between items-center">
        <div>          <p class="font-medium">${w.en}</p>
          <p class="text-sm text-gray-600">${w.ru}</p>
          ${w.topic ? `<p class="text-xs text-gray-400">${w.topic}</p>` : ''}
        </div>
        <div class="flex items-center gap-2">
          <span class="status-${w.level} px-2 py-1 rounded text-xs">${labels[w.level]}</span>
          <button onclick="deleteWord('${w.id}')" class="p-1 text-red-600 hover:bg-red-50 rounded"><i class="ph ph-trash"></i></button>
        </div>
      </div>
    `).join('');
  }

  function deleteWord(id) {
    data.words = data.words.filter(w => w.id !== id);
    saveData();
    renderWords();
  }

  // Students
  function saveStudent(e) {
    e.preventDefault();
    const id = document.getElementById('student-id').value || Date.now().toString();
    const student = {
      id,
      name: document.getElementById('student-name').value,
      subject: document.getElementById('student-subject').value,
      pin: document.getElementById('student-pin').value
    };
    const idx = data.students.findIndex(s => s.id === id);
    if (idx >= 0) data.students[idx] = student;
    else data.students.push(student);
    saveData();
    closeModal('student');
    renderStudents();
  }

  function renderStudents() {
    const list = document.getElementById('students-list');
    if (!data.students.length) {
      list.innerHTML = '<p class="text-gray-500 text-center py-8">Нет учеников</p>';
      return;
    }
    list.innerHTML = data.students.map(s => `
      <div class="bg-white p-4 rounded-xl border border-gray-200 flex justify-between items-center">
        <div>
          <h3 class="font-semibold">${s.name}</h3>
          <p class="text-sm text-gray-600">${s.subject}</p>
          <p class="text-xs text-gray-400 mt-1">PIN: ${s.pin}</p>
        </div>
        <div class="flex gap-1">          <button onclick="editStudent('${s.id}')" class="p-2 text-blue-600 hover:bg-blue-50 rounded"><i class="ph ph-pencil-simple"></i></button>
          <button onclick="deleteStudent('${s.id}')" class="p-2 text-red-600 hover:bg-red-50 rounded"><i class="ph ph-trash"></i></button>
        </div>
      </div>
    `).join('');
  }

  function editStudent(id) {
    const s = data.students.find(x => x.id === id);
    document.getElementById('student-id').value = s.id;
    document.getElementById('student-name').value = s.name;
    document.getElementById('student-subject').value = s.subject;
    document.getElementById('student-pin').value = s.pin;
    openModal('student');
  }

  function deleteStudent(id) {
    if (confirm('Удалить ученика?')) {
      data.students = data.students.filter(s => s.id !== id);
      saveData();
      renderStudents();
    }
  }

  function renderAll() {
    renderLessons();
    renderWords();
    renderStudents();
  }

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }

  // Init
  renderAll();
</script>
</body>
</html>
